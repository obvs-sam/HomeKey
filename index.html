
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get the App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      --primary: #ff6b6b;
      --primary-dark: #e64949;
      --secondary: #1dd1a1;
      --secondary-dark: #10ac84;
      --text: #2d3436;
      --subtext: #636e72;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: bgMove 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: #ffffffee;
      padding: 32px 24px;
      border-radius: 20px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: var(--subtext);
      margin-bottom: 24px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      color: white;
    }

    .btn-download {
      background: linear-gradient(45deg, #ff6b6b, #ff8787);
    }

    .btn-download:hover {
      background: linear-gradient(45deg, #e64949, #ff6b6b);
      transform: translateY(-2px);
    }

    .btn-open {
      background: linear-gradient(45deg, #1dd1a1, #48dbfb);
    }

    .btn-open:hover {
      background: linear-gradient(45deg, #10ac84, #0abde3);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 16px;
      }

      h1 {
        font-size: 22px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Ready to Go?</h1>
    <p>Get started by downloading or opening the app now.</p>

    <a class="btn btn-download" href="https://login.emitrackon.in/emitrackon.apk">
      📥 Download App
    </a>

    <a class="btn btn-open" href="myapp://open">
      🚀 Open App
    </a>
  </div>
</body>
</html>
